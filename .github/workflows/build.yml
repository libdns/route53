# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Build and test

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Pin to the version declared in go.mod. Using "stable" pulls in
          # whatever Go version was released most recently, which can race
          # ahead of golangci-lint releases — golangci-lint built with go1.25
          # panics type-checking go1.26 stdlib sources, which is what broke CI.
          go-version-file: go.mod


      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.5

      - name: Build
        run: go build -v ./...

      - name: Build examples
        run: cd examples && go build -v ./...

      - name: Test
        run: go test -v ./...
